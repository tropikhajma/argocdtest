apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: nginx:1.27
          ports:
            - containerPort: 1080
  strategy:
    blueGreen:
      activeService: demo-app-active
      previewService: demo-app-preview
      autoPromotionEnabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-active
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - name: http
      port: 1080
      targetPort: 1080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-preview
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - name: http
      port: 1080
      targetPort: 1080


